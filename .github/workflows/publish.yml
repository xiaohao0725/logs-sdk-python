name: Publish to PyPI

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Inject SDK hash from git commit
        run: echo "SDK_HASH = \"${{ github.sha }}\"" > src/logs_sdk/hash.py

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Create GitHub Release
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --generate-notes \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Notify logs-server
        run: |
          curl -s -X POST https://api.logs.codexs.cn/api/v1/sdk/webhook \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"sdk_type\":\"python\",\"sdk_version\":\"${GITHUB_REF#refs/tags/}\",\"sdk_hash\":\"${{ github.sha }}\""
